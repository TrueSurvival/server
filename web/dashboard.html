<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - MC.SODOPS.UZ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --secondary: #06b6d4;
            --accent: #f59e0b;
            --dark: #0f172a;
        }
        body {
            background: linear-gradient(135deg, var(--dark) 0%, #1a2a4a 50%, #0f1a2a 100%);
            color: #f1f5f9;
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .glass:hover {
            border-color: rgba(16, 185, 129, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(16, 185, 129, 0.2);
        }
        .gradient-text {
            background: linear-gradient(135deg, #10b981, #06b6d4, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .status-online {
            background: #10b981;
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="glass sticky top-0 z-50 border-b border-emerald-500/20">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="/" class="flex items-center gap-2 hover:opacity-80">
                    <div class="text-2xl">⛏️</div>
                    <h1 class="text-xl font-bold gradient-text">Dashboard</h1>
                </a>
            </div>
            <div class="flex gap-4">
                <button id="refreshBtn" class="glass px-4 py-2 rounded-lg border border-emerald-500/50">
                    🔄 Refresh
                </button>
                <a href="/" class="glass px-4 py-2 rounded-lg border border-cyan-500/50">← Back</a>
            </div>
        </div>
    </header>

    <!-- Main Dashboard -->
    <main class="pt-8 pb-12 px-4">
        <div class="max-w-7xl mx-auto">
            <!-- Title -->
            <div class="mb-8">
                <h1 class="text-4xl font-black gradient-text mb-2">Server Dashboard</h1>
                <p class="text-slate-300">Real-time monitoring and analytics</p>
            </div>

            <!-- Top Stats Grid -->
            <div class="grid md:grid-cols-4 gap-4 mb-6">
                <!-- Players -->
                <div class="glass p-6 rounded-xl border border-emerald-500/30">
                    <div class="flex justify-between mb-4">
                        <h3 class="text-slate-300 text-sm font-semibold">👥 Players</h3>
                    </div>
                    <div class="text-3xl font-black text-emerald-400" id="playersCount">0</div>
                    <div class="text-xs text-slate-400 mt-1">out of 20 max</div>
                </div>

                <!-- Memory -->
                <div class="glass p-6 rounded-xl border border-cyan-500/30">
                    <div class="flex justify-between mb-4">
                        <h3 class="text-slate-300 text-sm font-semibold">💾 Memory</h3>
                    </div>
                    <div class="text-3xl font-black text-cyan-400" id="memoryUsage">--</div>
                    <div class="text-xs text-slate-400 mt-1">RAM usage</div>
                </div>

                <!-- CPU -->
                <div class="glass p-6 rounded-xl border border-amber-500/30">
                    <div class="flex justify-between mb-4">
                        <h3 class="text-slate-300 text-sm font-semibold">⚙️ CPU</h3>
                    </div>
                    <div class="text-3xl font-black text-amber-400" id="cpuUsage">--</div>
                    <div class="text-xs text-slate-400 mt-1">processor load</div>
                </div>

                <!-- Uptime -->
                <div class="glass p-6 rounded-xl border border-purple-500/30">
                    <div class="flex justify-between mb-4">
                        <h3 class="text-slate-300 text-sm font-semibold">⏱️ Uptime</h3>
                    </div>
                    <div class="text-3xl font-black text-purple-400" id="uptimeInfo">--</div>
                    <div class="text-xs text-slate-400 mt-1">running time</div>
                </div>
            </div>

            <!-- Secondary Stats -->
            <div class="grid md:grid-cols-2 gap-6 mb-6">
                <!-- TPS -->
                <div class="glass p-6 rounded-xl border border-green-500/30">
                    <h3 class="font-bold text-green-400 mb-4">📊 Server TPS</h3>
                    <div class="flex justify-between">
                        <div>
                            <div class="text-2xl font-black text-green-300" id="tps1min">20</div>
                            <div class="text-xs text-slate-400">1 min</div>
                        </div>
                        <div>
                            <div class="text-2xl font-black text-green-300" id="tps5min">20</div>
                            <div class="text-xs text-slate-400">5 min</div>
                        </div>
                        <div>
                            <div class="text-2xl font-black text-green-300" id="tps15min">20</div>
                            <div class="text-xs text-slate-400">15 min</div>
                        </div>
                    </div>
                </div>

                <!-- Player List -->
                <div class="glass p-6 rounded-xl border border-pink-500/30">
                    <h3 class="font-bold text-pink-400 mb-4">🎮 Online Players</h3>
                    <div id="playerList" class="text-sm text-slate-300">
                        <div class="text-slate-500 italic">Loading...</div>
                    </div>
                </div>
            </div>

            <!-- Live Logs -->
            <div class="glass p-6 rounded-xl border border-emerald-500/30">
                <h3 class="font-bold text-emerald-400 mb-4">📋 Recent Logs</h3>
                <div class="max-h-80 overflow-y-auto bg-slate-950/50 p-4 rounded-lg font-mono text-xs">
                    <div id="logContainer" class="space-y-1">
                        <div class="text-slate-500">Loading logs...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = '/api';

        async function updateDashboard() {
            try {
                const res = await fetch(`${API_URL}/status`);
                const data = await res.json();

                // Update stats
                document.getElementById('playersCount').textContent = data.server.players;
                document.getElementById('memoryUsage').textContent = data.server.memory;
                document.getElementById('cpuUsage').textContent = data.server.cpu;
                document.getElementById('uptimeInfo').textContent = data.server.uptime;

                // Update TPS
                document.getElementById('tps1min').textContent = (data.server.tps?.['1min'] || 20).toFixed(1);
                document.getElementById('tps5min').textContent = (data.server.tps?.['5min'] || 20).toFixed(1);
                document.getElementById('tps15min').textContent = (data.server.tps?.['15min'] || 20).toFixed(1);

                // Update player list
                const playerList = document.getElementById('playerList');
                if (data.server.player_list && data.server.player_list.length > 0) {
                    playerList.innerHTML = data.server.player_list.map(p => 
                        `<div class="flex items-center gap-2">
                            <span class="w-2 h-2 bg-emerald-400 rounded-full"></span>
                            ${p}
                        </div>`
                    ).join('');
                } else {
                    playerList.innerHTML = '<div class="text-slate-500 italic">No players online</div>';
                }

                // Update logs
                const logRes = await fetch(`${API_URL}/logs`);
                const logData = await logRes.json();
                const logContainer = document.getElementById('logContainer');
                if (logData.logs && logData.logs.length > 0) {
                    logContainer.innerHTML = logData.logs.slice(-20).map(log =>
                        `<div class="text-slate-400">${log.substring(0, 150)}</div>`
                    ).join('');
                }
            } catch (e) {
                console.error('Update failed:', e);
            }
        }

        // Initial update
        updateDashboard();

        // Refresh button
        document.getElementById('refreshBtn').addEventListener('click', updateDashboard);

        // Auto-refresh every 5 seconds
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
